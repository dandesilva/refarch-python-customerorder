<!DOCTYPE HTML>
<html>
<head>
    <title>Login - Electronics and Movie Depot</title>
    <link rel="stylesheet" type="text/css" href="theme/layout.css">
    <script type="text/javascript" src="dojo/dojo/dojo.js"></script>
    <script type="text/javascript" src="auth-adapter.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }
        .login-container h2 {
            margin-top: 0;
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .login-button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .login-button:hover {
            background: #5568d3;
        }
        .error-message {
            color: red;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .demo-info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Customer Order Services</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Classic Dojo Edition</p>
        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" value="rbarcia" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="b0wfish" required>
            </div>
            <button type="submit" class="login-button" onclick="doLogin()">Login</button>
            <div class="error-message" id="errorMessage">Login failed. Please try again.</div>
        </form>
        <div class="demo-info">
            Demo credentials: rbarcia / b0wfish
        </div>
    </div>

    <script>
        function doLogin() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('errorMessage');

            errorMsg.style.display = 'none';

            authAdapter.login(username, password,
                function(data) {
                    window.location.href = 'index.html';
                },
                function(error) {
                    errorMsg.style.display = 'block';
                }
            );
        }

        // Check if already logged in
        if (authAdapter.isAuthenticated()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
